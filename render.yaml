services:
  - type: web
    name: insight-hub
    runtime: node
    region: oregon
    plan: starter
    buildCommand: pnpm install && pnpm run build:prod
    startCommand: pnpm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: BASE_PATH
        value: /
      - key: DATABASE_URL
        fromDatabase:
          name: insight-hub-db
          property: connectionString
      - key: SAM_GOV_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        sync: false
      - key: EXA_API_KEY
        sync: false
      - key: BROWSE_AI_API_KEY
        sync: false
      - key: BROWSE_AI_ROBOT_ID
        sync: false
      - key: BROWSER_USE_API_KEY
        sync: false
      - key: OLOSTEP_API_KEY
        sync: false
      - key: CLOD_API_KEY
        sync: false
      - key: CLOD_MODEL
        sync: false

databases:
  - name: insight-hub-db
    region: oregon
    plan: starter
    databaseName: insighthub
    user: insighthub
